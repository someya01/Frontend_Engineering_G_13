<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grid Layout</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#f2f2f2;
}

.container{
    width:900px;
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    grid-template-rows:80px 100px 100px 100px 80px;
    gap:5px;
    background:white;
    padding:5px;
}

.box{
    background:#d4c000;
    color:white;
    font-size:40px;
    display:flex;
    align-items:flex-start;
    padding:10px;
}

/* Grid Positions */

.box1{
    grid-column:1/4;
}

.box2{
    grid-column:1/2;
    grid-row:2/5;
}

.box3{
    grid-column:2/3;
    grid-row:2/3;
}

.box4{
    grid-column:3/4;
    grid-row:2/3;
}

.box5{
    grid-column:2/3;
    grid-row:3/4;
}

.box6{
    grid-column:3/4;
    grid-row:3/4;
}

.box7{
    grid-column:2/3;
    grid-row:4/5;
}

.box8{
    grid-column:3/4;
    grid-row:4/5;
}

.box9{
    grid-column:4/5;
}

.box10{
    grid-column:2/4;
    grid-row:5/6;
}
</style>
</head>

<body>

<div class="container">

<div class="box box1">1</div>

<div class="box box2">2</div>

<div class="box box3">3</div>

<div class="box box4">4</div>

<div class="box box5">5</div>

<div class="box box6">6</div>

<div class="box box7">7</div>

<div class="box box8">8</div>

<div class="box box9">9</div>

<div class="box box10">10</div>

</div>

</body>
</html>
